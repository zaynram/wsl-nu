# ——— use-grammars ————————————————————————————————————————————————————————————
[use-grammars]
    only = [
        'awk',
        'bash',
        'bibtex',
        'c',
        'c-sharp',
        'cmake',
        'comment',
        'cpp',
        'css',
        'csv',
        'cython',
        'debian',
        'diff',
        'dockerfile',
        'fish',
        'git-config',
        'git-rebase',
        'graphql',
        'hosts',
        'html',
        'ini',
        'ink',
        'java',
        'javascript',
        'jq',
        'jsdoc',
        'json',
        'json5',
        'just',
        'kdl',
        'latex',
        'llvm',
        'log',
        'mail',
        'make',
        'markdown',
        'matlab',
        'mermaid',
        'nginx',
        'nu',
        'passwd',
        'pem',
        'php',
        'powershell',
        'properties',
        'python',
        'regex',
        'robot',
        'rshtml',
        'rust',
        'rust-format-args',
        'scss',
        'sql',
        'sshclientconfig',
        'svelte',
        'task',
        'todotxt',
        'toml',
        'tsx',
        'typescript',
        'xml',
        'yaml',
    ]

# ——— language-server.rust-analyzer ———————————————————————————————————————————
[language-server.rust-analyzer]
    args    = []
    command = 'rust-analyzer'

    [language-server.rust-analyzer.config]
        check.command  = 'clippy'
        cargo.features = 'all'

# ——— language-server.superhtml ———————————————————————————————————————————————
[language-server.superhtml]
    args    = [ 'lsp' ]
    command = 'superhtml'

# ——— language-server.lemminx —————————————————————————————————————————————————
[language-server.lemminx]
    args    = []
    command = 'lemminx'

    [language-server.lemminx.config]
        xml.file-associations                  = [
            { pattern = '**/*.xsd', systemId = 'http://www.w3.org/2001/XMLSchema.xsd' },
        ]
        xml.format.joinCDATALines              = false
        xml.format.joinContentLines            = false
        xml.format.preserveAttributeLineBreaks = true
        xml.format.spaceBeforeEmptyCloseTag    = true
        xml.format.splitAttributes             = 'alignWithFirstAttr'
        xml.trace.server                       = 'verbose'
        xml.validation.enabled                 = true
        xml.validation.schema.enabled          = 'always'

# ——— language-server.oxc —————————————————————————————————————————————————————
[language-server.oxc]
    args    = [ '--type-check', '--lsp' ]
    command = 'oxlint'

    [language-server.oxc.config]
        typeAware = true

# ——— language-server.ty ——————————————————————————————————————————————————————
[language-server.ty]
    args    = [ 'server' ]
    command = 'ty'

    [language-server.ty.config]
        inlayHints.callArgumentNames = false
        experimental.rename          = true
        experimental.autoImport      = true

# ——— language-server.ruff ————————————————————————————————————————————————————
[language-server.ruff]
    args    = [ 'server', '-q', '--preview' ]
    command = 'ruff'

    [language-server.ruff.config]
        settings.lineLength                   = 100
        settings.logLevel                     = 'debug'
        settings.lint.preview                 = true
        settings.lint.ignore                  = [ 'E501' ]
        settings.format.preview               = true
        settings.format.quote-style           = 'single'
        settings.format.docstring-code-format = true
        settings.format.indent-style          = 'space'

# ——— language.nu —————————————————————————————————————————————————————————————
[[language]]
    auto-format      = true
    formatter        = { command = 'nufmt', args = [ '--stdin' ] }
    name             = 'nu'
    soft-wrap.enable = true

# ——— language.py —————————————————————————————————————————————————————————————
[[language]]
    auto-format      = true
    roots            = [
        'pyproject.toml',
        'setup.py',
        'pixi.lock',
        'pyrightconfig.json',
        'requirements.txt',
        '.venv/',
        '.pixi/envs/default/'
    ]
    formatter        = { command = 'ruff', args = [ 'format', '-' ] }
    language-servers = [ 'ruff', 'ty' ]
    indent.tab-width = 4
    indent.unit      = ' '
    name             = 'python'
    soft-wrap.enable = true

# ——— language.json ———————————————————————————————————————————————————————————
[[language]]
    comment-tokens   = '//'
    file-types       = [ 'json', 'jsonc', 'json5', 'code-workspace' ]
    indent.tab-width = 4
    indent.unit      = ' '
    name             = 'json'
    formatter        = { command = 'prettier', args = [
        '--parser',
        'json',
        '--write'
    ] }

# ——— language.html ———————————————————————————————————————————————————————————
[[language]]
    auto-format      = true
    formatter        = { command = 'superhtml', args = [ 'fmt', '--stdin' ] }
    name             = 'html'
    soft-wrap.enable = true

# ——— language.xml ————————————————————————————————————————————————————————————
[[language]]
    auto-format      = true
    language-servers = [ 'lemminx' ]
    name             = 'xml'
    soft-wrap.enable = true

# ——— language.markdown ———————————————————————————————————————————————————————
[[language]]
    name             = 'markdown'
    auto-format      = true
    soft-wrap.enable = true

# ——— language.typescript —————————————————————————————————————————————————————
[[language]]
    name             = 'typescript'
    language-servers = [ 'oxc', 'typescript-language-server' ]
    formatter        = { command = 'prettier', args = [
        '--parser',
        'typescript',
        '--no-semi',
        '--write'
    ] }
    auto-format      = true
    soft-wrap.enable = true
